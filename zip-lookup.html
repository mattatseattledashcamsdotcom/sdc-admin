<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ZIP Lookup — SDC Admin</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SDC Admin">
  <style>
    .zip-wrap { max-width: 520px; }
    .zip-form { display: flex; gap: 8px; margin-bottom: 12px; }
    #zip-input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 1.6rem;
      font-family: 'Courier New', monospace;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: 0.1em;
      outline: none;
      transition: border-color 0.2s;
    }
    #zip-input:focus { border-color: rgba(34,197,94,0.5); }
    #zip-input::placeholder { color: #484f58; font-weight: 400; font-size: 1.2rem; }
    #zip-btn {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0 22px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      min-width: 80px;
      transition: background 0.15s;
    }
    #zip-btn:active { background: #2ea043; }
    #zip-status { font-size: 0.82rem; color: #8b949e; min-height: 18px; margin-bottom: 16px; }
    #zip-status.ok { color: #3fb950; }
    #zip-status.bad { color: #f85149; }

    .date-group { margin-bottom: 18px; }
    .date-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #8b949e;
      margin-bottom: 8px;
    }
    .slot-row {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .slot-row:hover { border-color: #388bfd; background: #1c2333; }
    .slot-row.full { cursor: default; opacity: 0.5; }
    .slot-row.full:hover { border-color: #21262d; background: #161b22; }
    .slot-time { font-size: 0.92rem; font-weight: 700; color: #f8fafc; }
    .slot-cap {
      font-size: 0.75rem;
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 700;
    }
    .slot-cap.open { background: #0d4a1e; color: #3fb950; }
    .slot-cap.full { background: #3d1f1f; color: #f85149; }
    .empty-state { color: #484f58; font-size: 0.88rem; padding: 20px 0; }
    .addr-drop{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #d0d7de;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.12);z-index:100;max-height:220px;overflow-y:auto}
    .addr-item{padding:8px 12px;font-size:0.82rem;color:#1a1a1a;cursor:pointer;border-bottom:1px solid #f0f0f0;line-height:1.4}
    .addr-item:last-child{border-bottom:none}
    .addr-item:hover{background:#f0f6ff;color:#0969da}
    .addr-loading{padding:8px 12px;font-size:0.82rem;color:#666;font-style:italic}
  </style>
</head>
<body>
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">ZIP Lookup</div>
      <div class="topbar-sub">Check availability for a customer's ZIP code</div>
    </div>
  </div>
  <div class="content">
    <div class="zip-wrap">
      <div class="zip-form">
        <input id="zip-input" type="text" maxlength="5" placeholder="98056" inputmode="numeric" autocomplete="off">
        <button id="zip-btn" onclick="lookup()">Check</button>
      </div>
      <div id="zip-status"></div>
      <div id="results"></div>
    </div>
  </div>
</div>

<div class="modal-backdrop hidden" id="book-modal">
  <div class="modal" style="max-width:620px">
    <div class="modal-hdr">
      <div class="modal-title" id="book-modal-title">New Booking</div>
      <button class="btn btn-ghost btn-sm btn-icon" onclick="closeBookModal()">✕</button>
    </div>
    <div class="modal-body" id="book-modal-body"></div>
    <div class="modal-footer" id="book-modal-footer"></div>
  </div>
</div>

<script type="module">
import { requireAuth, renderShell } from './shell.js';
import { WORKER_URL, api } from './config.js';

requireAuth();
renderShell({ active: 'zip-lookup' });

const input = document.getElementById('zip-input');
const status = document.getElementById('zip-status');
const results = document.getElementById('results');

input.addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });
input.addEventListener('input', () => {
  if (input.value.length === 5) lookup();
});

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function fmtTime(t24) {
  const [h, m] = t24.split(':').map(Number);
  const ampm = h < 12 ? 'AM' : 'PM';
  const h12 = h % 12 || 12;
  return m === 0 ? `${h12} ${ampm}` : `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

window.lookup = async function() {
  const zip = input.value.trim();
  if (!/^\d{5}$/.test(zip)) return;
  status.textContent = 'Checking…';
  status.className = '';
  results.innerHTML = '';

  try {
    const today = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
    const res = await fetch(`${WORKER_URL}/api/availability?zip=${zip}&from=${today}&days=60`);
    const data = await res.json();
    const slots = data.available || [];

    if (!slots.length) {
      status.textContent = `ZIP ${zip} — outside service area or no availability in next 60 days`;
      status.className = 'bad';
      return;
    }

    // Group by date
    const byDate = {};
    for (const s of slots) {
      if (!byDate[s.date]) byDate[s.date] = [];
      byDate[s.date].push(s);
    }

    status.textContent = `ZIP ${zip} — ${Object.keys(byDate).length} days available`;
    status.className = 'ok';

    results.innerHTML = Object.entries(byDate).map(([date, daySlots]) => {
      const [y, m, d] = date.split('-').map(Number);
      const dow = new Date(y, m - 1, d).getDay();
      const label = `${DAYS[dow]}, ${MONTHS[m-1]} ${d}`;
      const rows = daySlots.map(s => {
        const time = `${fmtTime(s.start_time)} – ${fmtTime(s.end_time)}`;
        const open = s.remaining > 0;
        const slotData = encodeURIComponent(JSON.stringify({ date, zip, slot_id: s.slot_id, start_time: s.start_time, end_time: s.end_time, label: `${DAYS[dow]}, ${MONTHS[m-1]} ${d} · ${time}` }));
        return `<div class="slot-row${open ? '' : ' full'}" ${open ? `onclick="openBookModal('${slotData}')"` : ''}>
          <div class="slot-time">${time}</div>
          <div class="slot-cap ${open ? 'open' : 'full'}">${open ? `${s.remaining} open` : 'Booked'}</div>
        </div>`;
      }).join('');
      return `<div class="date-group"><div class="date-label">${label}</div>${rows}</div>`;
    }).join('');

  } catch {
    status.textContent = 'Error checking availability — try again';
    status.className = 'bad';
  }
};

window.openBookModal = function(encoded) {
  const s = JSON.parse(decodeURIComponent(encoded));
  document.getElementById('book-modal-title').textContent = `New Booking — ${s.label}`;
  document.getElementById('book-modal-body').innerHTML = `
    <div class="form-row" style="margin-bottom:16px">
      <div class="form-group" style="margin-bottom:0"><label>Customer Name *</label><input type="text" id="bk-name" placeholder="John Smith"></div>
      <div class="form-group" style="margin-bottom:0"><label>Phone *</label><input type="text" id="bk-phone" placeholder="(206) 555-1234"></div>
    </div>
    <div class="form-row" style="margin-bottom:16px">
      <div class="form-group" style="margin-bottom:0"><label>Email</label><input type="email" id="bk-email" placeholder="john@email.com"></div>
      <div class="form-group" style="margin-bottom:0"><label>ZIP</label><input type="text" id="bk-zip" value="${s.zip}"></div>
    </div>
    <div class="form-group" style="position:relative"><label>Street Address *</label>
      <input type="text" id="bk-address" placeholder="123 Main St" autocomplete="off" oninput="addrSuggest('bk-address','bk-addr-drop')">
      <div id="bk-addr-drop" class="addr-drop"></div>
    </div>
    <div class="form-row" style="margin-bottom:16px">
      <div class="form-group" style="margin-bottom:0"><label>City</label><input type="text" id="bk-city" placeholder="Kent"></div>
      <div class="form-group" style="margin-bottom:0"><label>State</label><input type="text" id="bk-state" placeholder="WA" style="max-width:80px"></div>
    </div>
    <div class="form-group"><label>Products / What's being installed</label><input type="text" id="bk-products" placeholder="VIOFO A229 Pro 2-Channel, 128GB SD card"></div>
    <div class="form-group"><label>Notes</label><textarea id="bk-notes" placeholder="Gate code, parking instructions, etc."></textarea></div>
    <input type="hidden" id="bk-date" value="${s.date}">
    <input type="hidden" id="bk-start" value="${s.start_time}">
    <input type="hidden" id="bk-end" value="${s.end_time}">
    <input type="hidden" id="bk-slot-id" value="${s.slot_id || ''}">
  `;
  document.getElementById('book-modal-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="closeBookModal()">Cancel</button>
    <button class="btn btn-primary" onclick="submitBooking()">Create Booking</button>
  `;
  document.getElementById('book-modal').classList.remove('hidden');
  document.getElementById('bk-name').focus();
};

window.closeBookModal = function() {
  document.getElementById('book-modal').classList.add('hidden');
};

document.getElementById('book-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('book-modal')) closeBookModal();
});

window.submitBooking = async function() {
  const name = document.getElementById('bk-name').value.trim();
  const phone = document.getElementById('bk-phone').value.trim();
  const street = document.getElementById('bk-address').value.trim();
  const city = document.getElementById('bk-city').value.trim();
  const state = document.getElementById('bk-state').value.trim();
  const zip = document.getElementById('bk-zip').value.trim();
  if (!name || !phone || !street) {
    toast('Name, phone, and address are required', true); return;
  }
  const fullAddress = (city || state)
    ? [street, city && state ? `${city}, ${state}` : city || state].filter(Boolean).join(' ')
    : street;
  const res = await api('/admin/bookings', {
    method: 'POST',
    body: JSON.stringify({
      customer_name: name,
      customer_email: document.getElementById('bk-email').value.trim(),
      customer_phone: phone,
      service_address: fullAddress,
      service_city: city || null,
      service_state: state || null,
      zip,
      appointment_date: document.getElementById('bk-date').value,
      appointment_time: document.getElementById('bk-start').value,
      appointment_end_time: document.getElementById('bk-end').value,
      slot_id: document.getElementById('bk-slot-id').value || null,
      products: document.getElementById('bk-products').value.trim(),
      notes: document.getElementById('bk-notes').value.trim(),
    }),
  });
  if (res.ok) {
    toast('Booking created — calendar event added');
    closeBookModal();
    lookup(); // refresh the slot counts
  } else {
    toast('Error creating booking', true);
  }
};

let addrTimer = null;
window.addrSuggest = function(inputId, dropId) {
  clearTimeout(addrTimer);
  const q = document.getElementById(inputId).value.trim();
  const drop = document.getElementById(dropId);
  if (q.length < 5) { drop.innerHTML = ''; drop.style.display = 'none'; return; }
  drop.innerHTML = '<div class="addr-loading">Looking up address…</div>';
  drop.style.display = 'block';
  addrTimer = setTimeout(async () => {
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&addressdetails=1&limit=5&countrycodes=us`, { headers: { 'Accept-Language': 'en-US', 'User-Agent': 'SDC-Admin/1.0' } });
      const results = await res.json();
      if (!results.length) { drop.innerHTML = ''; drop.style.display = 'none'; return; }
      drop.innerHTML = results.map((r, i) => `<div class="addr-item" data-i="${i}">${r.display_name}</div>`).join('');
      drop.style.display = 'block';
      drop.querySelectorAll('.addr-item').forEach((el, i) => {
        el.addEventListener('mousedown', e => {
          e.preventDefault();
          const a = results[i].address;
          const street = [a.house_number, a.road].filter(Boolean).join(' ');
          const city = a.city || a.town || a.village || a.county || '';
          const state = a.state || '';
          const zip = a.postcode || '';
          document.getElementById(inputId).value = street;
          const cityEl = document.getElementById(inputId.replace('address','city'));
          const stateEl = document.getElementById(inputId.replace('address','state'));
          const zipEl = document.getElementById(inputId.replace('address','zip'));
          if (cityEl) cityEl.value = city;
          if (stateEl) stateEl.value = state;
          if (zipEl && zip) zipEl.value = zip;
          drop.innerHTML = ''; drop.style.display = 'none';
        });
      });
    } catch(e) { drop.innerHTML = ''; drop.style.display = 'none'; }
  }, 350);
};

window.toast = function(msg, err=false) {
  const el = document.createElement('div');
  el.className = `toast ${err ? 'toast-error' : 'toast-success'}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2800);
};
</script>
</body>
</html>
